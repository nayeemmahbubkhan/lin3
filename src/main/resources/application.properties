spring.application.name=tech-pulse

# Keep this landing-page MVP self-contained by disabling heavy integrations
# until they are explicitly configured.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.ai.autoconfigure.azure.openai.AzureOpenAiAutoConfiguration,org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration,org.springframework.ai.autoconfigure.mistralai.MistralAiAutoConfiguration

spring.ai.anthropic.chat.enabled=false
spring.ai.azure.openai.chat.enabled=false
spring.ai.azure.openai.embedding.enabled=false
spring.ai.azure.openai.image.enabled=false
spring.ai.azure.openai.audio.transcription.enabled=false
spring.ai.mistralai.chat.enabled=false
spring.ai.mistralai.embedding.enabled=false

techpulse.updates.default-limit=5
techpulse.updates.source-url=https://hn.algolia.com/api/v1/search_by_date?tags=story
techpulse.updates.github-rss-url=https://github.com/spring-projects/spring-boot/releases.atom
techpulse.updates.github-rss-urls=
techpulse.updates.source-weights=hacker-news:1.0,github-releases:1.1
techpulse.updates.common-limits=5,8
techpulse.updates.cache.enabled=true
techpulse.updates.cache-ttl-seconds=300
techpulse.updates.auto-refresh.enabled=false
techpulse.updates.auto-refresh-interval-ms=300000
techpulse.updates.quality.enabled=true
techpulse.updates.quality.keywords=security,release,ai,open-source,cloud,database
techpulse.llm.enabled=false
techpulse.llm.base-url=http://localhost:11434
techpulse.llm.model=qwen2.5:7b-instruct

