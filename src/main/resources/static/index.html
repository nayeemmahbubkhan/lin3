<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tech Pulse Home</title>
	<style>
		:root {
			font-family: Arial, sans-serif;
			color: #111827;
			background: #f8fafc;
		}
		body {
			margin: 0;
			padding: 2rem 1rem;
			display: grid;
			place-items: center;
		}
		main {
			width: min(900px, 96vw);
			background: white;
			padding: 1.5rem;
			border-radius: 14px;
			box-shadow: 0 12px 32px rgba(15, 23, 42, 0.09);
		}
		.nav {
			display: flex;
			justify-content: flex-end;
			gap: 0.8rem;
			margin-bottom: 0.8rem;
		}
		.nav a {
			text-decoration: none;
			font-weight: 600;
			color: #334155;
		}
		.nav a.active {
			color: #1d4ed8;
		}
		h1 {
			margin-top: 0;
			margin-bottom: 0.25rem;
			text-align: center;
		}
		.subtitle {
			margin: 0 0 0.7rem;
			color: #475569;
			font-size: 0.96rem;
			text-align: center;
		}
		.toolbar {
			display: flex;
			gap: 0.7rem;
			align-items: center;
			flex-wrap: wrap;
			margin-bottom: 0.8rem;
		}
		button {
			background: linear-gradient(135deg, #2563eb, #1d4ed8);
			color: white;
			border: 0;
			padding: 0.55rem 0.9rem;
			border-radius: 8px;
			cursor: pointer;
			font: inherit;
			font-weight: 600;
		}
		button:disabled {
			opacity: 0.7;
			cursor: wait;
		}
		.badge {
			padding: 0.35rem 0.6rem;
			border-radius: 999px;
			font-size: 0.85rem;
			font-weight: 600;
		}
		.badge.ok {
			background: #dcfce7;
			color: #166534;
		}
		.badge.down {
			background: #fee2e2;
			color: #991b1b;
		}
		.badge.unknown {
			background: #e2e8f0;
			color: #334155;
		}
		#meta {
			color: #475569;
			margin: 0 0 0.2rem;
		}

		.sections {
			display: grid;
			gap: 1rem;
		}
		.section {
			padding-top: 0.25rem;
		}
		.section-head {
			display: flex;
			justify-content: space-between;
			align-items: baseline;
			margin-bottom: 0.5rem;
		}
		.section-head h2 {
			font-size: 1rem;
			margin: 0;
		}
		.section-head .hint {
			font-size: 0.83rem;
			color: #64748b;
		}
		.grid {
			display: grid;
			gap: 0.9rem;
			grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
		}
		.card {
			background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
			padding: 0.9rem;
			border-radius: 12px;
			border: 1px solid #e2e8f0;
			box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
		}
		.card.security { border-top: 4px solid #dc2626; }
		.card.release { border-top: 4px solid #2563eb; }
		.card.signal { border-top: 4px solid #7c3aed; }
		.card-label {
			display: inline-block;
			font-size: 0.76rem;
			font-weight: 700;
			letter-spacing: 0.03em;
			text-transform: uppercase;
			margin-bottom: 0.5rem;
			padding: 0.2rem 0.5rem;
			border-radius: 999px;
		}
		.card-label.security { background: #fee2e2; color: #991b1b; }
		.card-label.release { background: #dbeafe; color: #1e40af; }
		.card-label.signal { background: #ede9fe; color: #5b21b6; }
		.card h3 {
			margin: 0 0 0.3rem;
			font-size: 1.05rem;
		}
		.item-summary {
			display: -webkit-box;
			-webkit-line-clamp: 3;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}
		.item-meta {
			font-size: 0.9rem;
			color: #64748b;
		}
		.item-action {
			font-weight: 600;
			color: #1e40af;
		}
		a {
			color: #2563eb;
		}
	</style>
</head>
<body>
<main>
	<nav class="nav" aria-label="Primary">
		<a href="/" class="active">Home</a>
		<a href="/contact.html">Contact</a>
	</nav>
	<h1>Tech Pulse Briefing</h1>
	<p class="subtitle">A focused daily view: 2 updates each for security, releases, and ecosystem signals.</p>
	<div class="toolbar">
		<button id="refreshBtn" type="button">Refresh feed</button>
		<span id="sourceBadge" class="badge unknown">Source: checking...</span>
	</div>
	<p id="meta">Loading latest updates...</p>
	<div id="list" class="sections"></div>
</main>

<script>
	const refreshBtn = document.getElementById('refreshBtn');
	const sourceBadge = document.getElementById('sourceBadge');
	const meta = document.getElementById('meta');
	const list = document.getElementById('list');
	const cardTypes = [
		{ key: 'security', label: 'Security watch' },
		{ key: 'release', label: 'Release impact' },
		{ key: 'signal', label: 'Ecosystem signal' }
	];

	function escapeHtml(input) {
		return String(input ?? '')
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/\"/g, '&quot;')
			.replace(/'/g, '&#39;');
	}

	function detectType(item) {
		const text = `${item.title || ''} ${item.summary || ''} ${item.action || ''} ${item.url || ''}`.toLowerCase();
		if (/(security|cve|vulnerability|patch)/.test(text)) {
			return 'security';
		}
		if (/(release|launch|version|changelog|ga\b)/.test(text)) {
			return 'release';
		}
		return 'signal';
	}

	function pickTwoPerCategory(items) {
		const groups = { security: [], release: [], signal: [] };
		for (const item of items) {
			groups[detectType(item)].push(item);
		}

		const used = new Set();
		const fallbackPool = items.filter(item => {
			if (!item || !item.url || used.has(item.url)) {
				return false;
			}
			return true;
		});

		return cardTypes.map(type => {
			const selected = [];
			for (const item of groups[type.key]) {
				if (selected.length === 2) {
					break;
				}
				if (item.url && !used.has(item.url)) {
					selected.push(item);
					used.add(item.url);
				}
			}

			for (const item of fallbackPool) {
				if (selected.length === 2) {
					break;
				}
				if (item.url && !used.has(item.url)) {
					selected.push(item);
					used.add(item.url);
				}
			}

			while (selected.length < 2) {
				selected.push(null);
			}
			return { type, items: selected };
		});
	}

	async function loadUpdates() {
		try {
			const response = await fetch('/api/updates?limit=16');
			const data = await response.json();
			const freshness = data.fromCache
				? 'cached at ' + new Date(data.cachedAt).toLocaleString()
				: 'freshly generated';
			meta.textContent = 'Source: ' + data.source + ' | Generated: ' + new Date(data.generatedAt).toLocaleString() + ' | ' + freshness;
			list.innerHTML = '';

			if (!data.items || data.items.length === 0) {
				list.innerHTML = '<article class="card"><h3>No updates yet</h3><p>Try refreshing in a moment.</p></article>';
				return;
			}

			const sections = pickTwoPerCategory(data.items);
			for (const section of sections) {
				const sectionEl = document.createElement('section');
				sectionEl.className = 'section';
				sectionEl.innerHTML = `
					<div class="section-head">
						<h2>${section.type.label}</h2>
						<span class="hint">2 items</span>
					</div>
				`;

				const gridEl = document.createElement('div');
				gridEl.className = 'grid';

				for (const item of section.items) {
					const card = document.createElement('article');
					card.className = `card ${section.type.key}`;
					if (!item) {
						card.innerHTML = `
							<span class="card-label ${section.type.key}">${section.type.label}</span>
							<h3>No matching item</h3>
							<p class="item-summary">A second update for this category is not available right now.</p>
						`;
						gridEl.appendChild(card);
						continue;
					}

					card.innerHTML = `
						<span class="card-label ${section.type.key}">${section.type.label}</span>
						<h3>${escapeHtml(item.title)}</h3>
						<p class="item-meta">${escapeHtml(item.source)} • ${new Date(item.publishedAt).toLocaleString()}</p>
						<p class="item-summary">${escapeHtml(item.summary)}</p>
						<p class="item-action">${escapeHtml(item.action)}</p>
						<p><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Read source</a></p>
					`;
					gridEl.appendChild(card);
				}

				sectionEl.appendChild(gridEl);
				list.appendChild(sectionEl);
			}
		} catch (error) {
			meta.textContent = 'Could not load updates right now.';
			list.innerHTML = '<article class="card"><h3>Temporarily unavailable</h3><p>Please try again in a moment.</p></article>';
		}
	}

	async function loadHealth() {
		try {
			const response = await fetch('/api/health/updates');
			const health = await response.json();
			if (health.source && health.source.available) {
				sourceBadge.className = 'badge ok';
				sourceBadge.textContent = 'Source: available';
			} else {
				sourceBadge.className = 'badge down';
				sourceBadge.textContent = 'Source: unavailable';
			}
		} catch (error) {
			sourceBadge.className = 'badge unknown';
			sourceBadge.textContent = 'Source: unknown';
		}
	}

	async function refreshNow() {
		refreshBtn.disabled = true;
		refreshBtn.textContent = 'Refreshing feed...';
		try {
			await fetch('/api/updates/refresh-all', { method: 'POST' });
			await Promise.all([loadUpdates(), loadHealth()]);
		} finally {
			refreshBtn.disabled = false;
			refreshBtn.textContent = 'Refresh feed';
		}
	}

	refreshBtn.addEventListener('click', refreshNow);
	loadUpdates();
	loadHealth();
	setInterval(loadHealth, 30000);
</script>
</body>
</html>
