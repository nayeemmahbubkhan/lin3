<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Contact | Tech Pulse</title>
	<style>
		:root {
			font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
			color: #ffffff;
			background: #000000;
			--panel: #000000;
			--line: #9ca3af;
			--muted: #9ca3af;
			--accent: #9ca3af;
		}
		body {
			margin: 0;
			padding: 1.5rem 1rem;
			display: grid;
			place-items: center;
		}
		main {
			width: min(680px, 94vw);
			background: var(--panel);
			padding: 2rem;
			border-radius: 8px;
			border: 1px solid var(--line);
		}
		.nav {
			display: flex;
			justify-content: flex-end;
			gap: 0.8rem;
			margin-bottom: 1rem;
		}
		.nav a {
			text-decoration: none;
			font-weight: 600;
			color: var(--muted);
		}
		.nav a.active {
			color: var(--accent);
		}
		h1 {
			margin: 0 0 0.5rem;
			font-size: 1.35rem;
		}
		p {
			color: var(--muted);
			line-height: 1.5;
		}
		.card {
			margin: 1rem auto 0;
			padding: 1rem;
			width: min(420px, 100%);
			background: #000000;
			border: 1px solid var(--line);
			border-radius: 8px;
			text-align: center;
		}
		.email-label {
			display: block;
			font-size: 0.86rem;
			color: var(--muted);
			margin-bottom: 0.2rem;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}
		.email {
			font-size: 1rem;
			font-weight: 500;
			color: var(--accent);
			text-decoration: none;
		}
		.email:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
<main>
	<nav class="nav" aria-label="Primary">
		<a href="/">Home</a>
		<a href="/contact.html" class="active">Contact</a>
	</nav>

	<h1>Contact</h1>
	<p>If you want to discuss a project or share feedback feel free to reach out directly.</p>
	<div class="card">
		<span class="email-label">Email</span>
		<a class="email" href="mailto:nayeem.khan@hotmail.com">nayeem.khan@hotmail.com</a>
	</div>
</main>
</body>
</html>
