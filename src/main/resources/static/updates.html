<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tech Pulse Updates</title>
	<style>
		:root {
			font-family: Arial, sans-serif;
			color: #111827;
			background: #f8fafc;
		}
		body {
			margin: 0;
			padding: 2rem 1rem;
			display: grid;
			place-items: center;
		}
		main {
			width: min(900px, 96vw);
		}
		h1 {
			margin-top: 0;
		}
		#meta {
			color: #475569;
			margin-bottom: 1rem;
		}
		.toolbar {
			display: flex;
			gap: 0.8rem;
			align-items: center;
			margin-bottom: 1rem;
			flex-wrap: wrap;
		}
		.toolbar input {
			padding: 0.5rem 0.7rem;
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			font: inherit;
		}
		button {
			background: #2563eb;
			color: white;
			border: 0;
			padding: 0.55rem 0.9rem;
			border-radius: 8px;
			cursor: pointer;
			font: inherit;
			font-weight: 600;
		}
		button:disabled {
			opacity: 0.7;
			cursor: wait;
		}
		.badge {
			padding: 0.35rem 0.6rem;
			border-radius: 999px;
			font-size: 0.85rem;
			font-weight: 600;
		}
		.badge.ok {
			background: #dcfce7;
			color: #166534;
		}
		.badge.down {
			background: #fee2e2;
			color: #991b1b;
		}
		.badge.unknown {
			background: #e2e8f0;
			color: #334155;
		}
		.grid {
			display: grid;
			gap: 1rem;
		}
		.card {
			background: white;
			padding: 1rem;
			border-radius: 10px;
			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
		}
		.card h3 {
			margin: 0 0 0.3rem;
		}
		.meta {
			font-size: 0.9rem;
			color: #64748b;
		}
		.action {
			font-weight: 600;
			color: #1e40af;
		}
		a {
			color: #2563eb;
		}
	</style>
</head>
<body>
<main>
	<h1>Tech Pulse</h1>
	<div class="toolbar">
		<input id="limitsInput" type="text" value="5,8" aria-label="Refresh limits" title="Comma-separated limits">
		<button id="refreshBtn" type="button">Refresh now</button>
		<span id="sourceBadge" class="badge unknown">Source: checking...</span>
	</div>
	<p id="meta">Loading latest updates...</p>
	<div id="list" class="grid"></div>
</main>

<script>
	const list = document.getElementById('list');
	const meta = document.getElementById('meta');
	const refreshBtn = document.getElementById('refreshBtn');
	const limitsInput = document.getElementById('limitsInput');
	const sourceBadge = document.getElementById('sourceBadge');

	async function loadUpdates() {
		try {
			const response = await fetch('/api/updates?limit=8');
			const data = await response.json();
			const freshness = data.fromCache
				? 'cached at ' + new Date(data.cachedAt).toLocaleString()
				: 'freshly generated';
			meta.textContent = 'Source: ' + data.source + ' | Generated: ' + new Date(data.generatedAt).toLocaleString() + ' | ' + freshness;
			list.innerHTML = '';

			for (const item of data.items) {
				const card = document.createElement('article');
				card.className = 'card';
				card.innerHTML = `
					<h3>${item.title}</h3>
					<p class="meta">${item.source} • ${new Date(item.publishedAt).toLocaleString()}</p>
					<p>${item.summary}</p>
					<p class="action">${item.action}</p>
					<p><a href="${item.url}" target="_blank" rel="noopener noreferrer">Read source</a></p>
				`;
				list.appendChild(card);
			}
		} catch (error) {
			meta.textContent = 'Could not load updates right now.';
		}
	}

	async function loadHealth() {
		try {
			const response = await fetch('/api/health/updates');
			const health = await response.json();
			if (health.source && health.source.available) {
				sourceBadge.className = 'badge ok';
				sourceBadge.textContent = 'Source: available';
			} else {
				sourceBadge.className = 'badge down';
				sourceBadge.textContent = 'Source: unavailable';
			}
		} catch (error) {
			sourceBadge.className = 'badge unknown';
			sourceBadge.textContent = 'Source: unknown';
		}
	}

	async function refreshNow() {
		refreshBtn.disabled = true;
		refreshBtn.textContent = 'Refreshing...';
		try {
			const limits = limitsInput.value.trim();
			const query = limits ? '?limits=' + encodeURIComponent(limits) : '';
			await fetch('/api/updates/refresh-all' + query, { method: 'POST' });
			await Promise.all([loadUpdates(), loadHealth()]);
		} finally {
			refreshBtn.disabled = false;
			refreshBtn.textContent = 'Refresh now';
		}
	}

	refreshBtn.addEventListener('click', refreshNow);
	loadUpdates();
	loadHealth();
	setInterval(loadHealth, 30000);
</script>
</body>
</html>
