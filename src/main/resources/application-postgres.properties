spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.ai.autoconfigure.azure.openai.AzureOpenAiAutoConfiguration,org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration,org.springframework.ai.autoconfigure.mistralai.MistralAiAutoConfiguration

spring.datasource.url=${TECHPULSE_DB_URL:${LIN3_DB_URL:jdbc:postgresql://localhost:5432/tech_pulse}}
spring.datasource.username=${TECHPULSE_DB_USER:${LIN3_DB_USER:techpulse}}
spring.datasource.password=${TECHPULSE_DB_PASSWORD:${LIN3_DB_PASSWORD:techpulse}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

